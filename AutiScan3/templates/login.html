<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | AutiScan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
  <style>
    body { background: #fdfaf8; display: flex; flex-direction: column; min-height: 100vh; font-family: 'Inter', sans-serif;}
    .auth-container { max-width: 450px; margin: 4rem auto; padding: 2.5rem; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); text-align: center; border: 1px solid #f4ece6;}
    .auth-container input, .auth-container select { width: 100%; padding: 14px; margin: 10px 0 20px; border: 1px solid #ddd; border-radius: 12px; font-size: 1rem; box-sizing: border-box; font-family: 'Inter', sans-serif;}
    .auth-container button { width: 100%; padding: 16px; background: #e27d60; color: white; border: none; border-radius: 30px; font-size: 1.1rem; font-weight: 600; cursor: pointer; transition: 0.3s; }
    .auth-container button:hover { opacity: 0.9; transform: translateY(-2px); box-shadow: 0 5px 15px rgba(226, 125, 96, 0.3);}
    .auth-flash { color: #d32f2f; background: #ffebee; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: 500;}
    .navbar { background: white; padding: 1.5rem 5%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 15px rgba(0,0,0,0.03); }
    .logo {font-size: 1.5rem; font-weight: 700; display: flex; align-items: center; gap: 8px;}
    .logo-icon { background: #e27d60; color: white; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center;}
    a {text-decoration: none;}
  </style>
</head>
<body>
  <header class="navbar">
    <a href="/" class="logo" style="color: #333;">
      <div class="logo-icon">♡</div>
      <span>AutiScan</span>
    </a>
  </header>

  <main style="flex: 1;">
    <div class="auth-container">
      <div style="font-size: 3.5rem; margin-bottom: 10px; color: #e27d60;">♡</div>
      <h2 style="font-size: 2rem; color: #333; margin-bottom: 10px;">Welcome Back</h2>
      <p style="color: #666; margin-bottom: 2rem; font-size: 1.1rem;">Log in to access your games and profiles.</p>
      
      {% with messages = get_flashed_messages() %}
        {% if messages %}
          {% for message in messages %}
            <div class="auth-flash">{{ message }}</div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="POST" action="{{ url_for('login') }}">
        <div style="text-align: left;">
          <label style="font-weight: 600; color: #444; font-size: 0.95rem;">Email Address</label>
          <input type="email" name="email" required placeholder="you@example.com">
          
          <label style="font-weight: 600; color: #444; font-size: 0.95rem;">Password</label>
          <input type="password" name="password" required placeholder="••••••••">
        </div>
        <button type="submit" style="margin-bottom: 15px;">Sign In</button>
        
        <div style="display: flex; align-items: center; margin: 20px 0; color: #888;">
          <hr style="flex-grow: 1; border: none; border-top: 1px solid #eee;">
          <span style="padding: 0 10px; font-size: 0.9rem;">or</span>
          <hr style="flex-grow: 1; border: none; border-top: 1px solid #eee;">
        </div>
        
        <a href="{{ url_for('login_google') }}" style="display: flex; align-items: center; justify-content: center; width: 100%; padding: 14px; background: white; color: #444; border: 1px solid #ddd; border-radius: 30px; font-size: 1.05rem; font-weight: 600; cursor: pointer; transition: 0.3s; text-decoration: none; box-sizing: border-box;">
          <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" alt="Google Logo" style="width: 20px; margin-right: 10px;">
          Continue with Google
        </a>
      </form>
      <p style="margin-top: 2rem; color: #666;">Don't have an account? <a href="{{ url_for('register') }}" style="color: #e27d60; font-weight: 700;">Create one</a></p>
    </div>
  </main>
</body>
</html>
