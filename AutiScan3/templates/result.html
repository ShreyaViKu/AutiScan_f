<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Result | AutiScan</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>

<!-- ✅ SAME NAVBAR -->
<header class="navbar">
  <div class="logo">
    <div class="logo-icon">♡</div>
    <span>AutiScan</span>
  </div>

  <nav>
    <a href="/">Home</a>
    <a href="/about">About Autism</a>
    <a href="/screening">Screening</a>
  </nav>
</header>

<div class="container mt-5">

<div class="card shadow-lg p-5 rounded-4 text-center">

<h2 class="text-primary mb-3">
<i class="bi bi-activity"></i> Screening Result
</h2>

<h1 class="display-5 fw-bold">{{ percent }}%</h1>
<p class="text-muted">Autism Risk Probability</p>

<div class="progress mb-4" style="height: 25px;">
<div class="progress-bar 
{% if percent < 30 %}bg-success
{% elif percent < 60 %}bg-warning
{% else %}bg-danger{% endif %}"
style="width: {{ percent }}%">
</div>
</div>

<h4 class="mt-3">
Spectrum Level:
<span class="badge 
{% if spectrum == 'Low Risk' %}bg-success
{% elif spectrum == 'Moderate Risk' %}bg-warning
{% else %}bg-danger{% endif %}">
{{ spectrum }}
</span>
</h4>

<p class="mt-3">
<b>Confidence:</b> {{ confidence }}%
</p>

<form id="pdfForm" action="/download-pdf" method="POST">
  <!-- Hidden inputs for all details -->
  <input type="hidden" name="percent" value="{{ percent }}">
  <input type="hidden" name="spectrum" value="{{ spectrum }}">
  <input type="hidden" name="confidence" value="{{ confidence }}">
  <input type="hidden" name="age" value="{{ age }}">
  <input type="hidden" name="gender" value="{{ gender }}">
  <input type="hidden" name="jundice" value="{{ jundice }}">
  <input type="hidden" name="austim" value="{{ austim }}">
  <input type="hidden" name="name" id="userName" value="">

  <button type="button" class="btn btn-primary mt-3" id="downloadPdfBtn"onclick="askNameAndSubmit()">
    <i class="bi bi-download"></i> Download PDF Report
  </button>
</form>

<p class="text-muted mt-4">
This is an AI-based screening tool and not a medical diagnosis.
</p>

<a href="/" class="btn btn-outline-primary mt-3 rounded-pill px-4">
<i class="bi bi-house"></i> Back to Home
</a>

</div>
</div>

<script>
function askNameAndSubmit() {
    let name = prompt("Please enter your name:");
    if(name && name.trim() !== "") {
        // Set the hidden input value
        document.getElementById("userName").value = name.trim();
        // Submit the form
        document.getElementById("pdfForm").submit();
    } else {
        alert("Name is required to download the report.");
    }
}

function submitPDF() {
    // Ask for user name
    let userName = prompt("Please enter your name:");
    if (!userName || userName.trim() === "") {
        alert("Name is required to download the PDF report!");
        return; // stop submission if name is empty
    }

    // Set the name in the hidden input
    document.getElementById("nameInput").value = userName.trim();

    // Submit the form
    document.getElementById("pdfForm").submit();
}
</script>

</body>
</html>
